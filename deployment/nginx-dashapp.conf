# Nginx config for Columbia Fruit Analytics Dash app.
# Copy to: /etc/nginx/sites-available/dashapp
# Enable: sudo ln -sf /etc/nginx/sites-available/dashapp /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # Replace with your domain or leave _ for default

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Max body size (for PDF uploads etc)
    client_max_body_size 10M;

    # Dash app (all routes)
    location / {
        proxy_pass http://unix:/run/dashapp/dashapp.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Dash 4.0 callbacks)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Static Dash components - cache for 1 day
    location /_dash-component-suites/ {
        proxy_pass http://unix:/run/dashapp/dashapp.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
    }

    # Health check
    location /health {
        proxy_pass http://unix:/run/dashapp/dashapp.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
